<!-- Look & feel. Edit colors, spacing, and layout here. -->
<style>
/* ============================================================================
   Stephen Roe — interactive resume.  Design tokens + component classes.
   Content lives in the JSON island (#resume-data); this file is the look.
   ========================================================================== */
:root {
  --bg:#f2eee4; --ink:#15150f; --ink2:#1b1b14;
  --green:#1f5d44; --green-soft:#6fae8f;
  --line:#ddd6c4; --line2:#e2dccc; --line3:#d6cfbd; --line4:#cdc6b4;
  --muted:#75705f; --muted2:#6f6a5c; --muted3:#8a8473; --muted4:#9a9484;
  --muted5:#b0a890; --faint:#bcb4a0;
  --body:#3f3d33; --panel:#ece6d8; --panel2:#fbfaf4; --dark:#15150f;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --serif:'IBM Plex Serif',Georgia,serif;
  --sans:'IBM Plex Sans',system-ui,-apple-system,sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:var(--bg); color:var(--ink); font-family:var(--sans);
  -webkit-font-smoothing:antialiased; overflow-x:clip;
}
.em { font-style:italic; color:var(--green); }
a { color:inherit; }

/* --- scroll progress bar --------------------------------------------------- */
.progress { position:fixed; top:0; left:0; right:0; height:2px; z-index:60; }
.progress__bar {
  height:100%; width:100%; background:var(--green);
  transform:scaleX(0); transform-origin:0 50%; transition:transform .1s linear;
}

/* --- ticker ---------------------------------------------------------------- */
.ticker {
  border-bottom:1px solid var(--line); background:var(--panel);
  font-family:var(--mono); font-size:11px; letter-spacing:.08em; color:#5d5849;
}
.ticker__inner {
  max-width:1280px; margin:0 auto; padding:9px 40px;
  display:flex; justify-content:space-between; gap:20px; flex-wrap:wrap;
}
.ticker__dot { color:var(--green); }
.ticker__muted { color:var(--muted3); }

/* --- shell + rail ---------------------------------------------------------- */
.shell { max-width:1280px; margin:0 auto; display:grid; grid-template-columns:248px 1fr; align-items:start; }

.rail {
  position:sticky; top:0; align-self:start; max-height:100vh; overflow:auto;
  padding:40px 28px 28px; border-right:1px solid var(--line);
  display:flex; flex-direction:column;
}
.rail__cv { font-family:var(--mono); font-size:11px; letter-spacing:.18em; color:var(--green); font-weight:600; }
.rail__name { margin-top:16px; font-family:var(--serif); font-size:26px; line-height:1.04; font-weight:500; letter-spacing:-.01em; }
.rail__tag { margin-top:12px; font-size:12.5px; line-height:1.4; color:var(--muted2); }
.rail__nav { margin-top:34px; display:flex; flex-direction:column; gap:2px; font-family:var(--mono); font-size:12px; }
.nav__item {
  display:flex; gap:12px; padding:7px 0; color:var(--muted); text-decoration:none;
  border-top:1px solid var(--line2); transition:color .2s ease, padding .2s ease;

    var s = DATA.stories;
    var filters = s.filters.map(function (f, i) {
      return '<button class="fbtn' + (i === 0 ? " is-on" : "") + '" data-filter="' + esc(f.key) +
        '">' + esc(f.label) + "</button>";
    }).join("");
    var items = s.items.map(function (it) {
      var body = it.body.map(function (p) {
        var parts = p.split(" — ");
        if (parts.length < 2) return "<p>" + esc(p) + "</p>";
        return "<p><strong>" + esc(parts.shift()) + "</strong> — " + esc(parts.join(" — ")) + "</p>";
      }).join("");
      var stack = it.stack.map(function (x) { return "<span>" + esc(x) + "</span>"; }).join("");
      return (
        '<article class="story" data-domain="' + esc(it.domain) + '">' +
          '<div class="story__row" data-toggle role="button" tabindex="0" aria-expanded="false">' +
            '<div class="story__tag">' + esc(it.tag).replace(/\n/g, "<br>") + "</div>" +
            "<div><h3 class=\"story__title\">" + esc(it.title) + "</h3>" +
              '<div class="story__meta">' + esc(it.meta) + "</div></div>" +
            '<div class="story__metricwrap"><div class="story__metric"><b>' + esc(it.metric) +
              "</b><span>" + esc(it.metricSub) + '</span></div><span class="story__ind">+</span></div>' +
          "</div>" +
          '<div class="story__detail"><div class="story__detail-inner">' +
            '<div class="story__body">' + body + "</div>" +
            '<div class="story__stack"><div class="story__stack-label">STACK</div>' +
              '<div class="story__stack-list">' + stack + "</div></div>" +
          "</div></div>" +
        "</article>"
      );
    }).join("");
    return (
      '<section id="sec-03" class="section" data-reveal>' +
        '<div class="stories__head"><div>' +
          '<div class="kicker">' + esc(s.kicker) + "</div>" +
          '<h2 class="stories__heading">' + esc(s.heading) + "</h2></div>" +
          '<div class="filters" data-noprint>' + filters + "</div>" +
        "</div>" +
        '<div class="stories__list">' + items + "</div>" +
      "</section>"
    );
  }

  function methodHtml() {
    var m = DATA.method;
    var steps = m.steps.map(function (st) {
      return '<div class="step"><div class="step__label">' + esc(st.label) + "</div>" +
        '<div class="step__title">' + esc(st.title) + "</div>" +
        '<p class="step__body">' + esc(st.body) + "</p></div>";
    }).join("");
    return (
      '<section id="sec-04" class="section section--panel" data-reveal>' +
        '<div class="kicker">' + esc(m.kicker) + "</div>" +
        '<h2 class="section__heading">' + esc(m.heading) + "</h2>" +
        '<div class="steps">' + steps + "</div>" +
      "</section>"
    );
  }

  function fitHtml() {
    var f = DATA.fit;
    var cards = f.cards.map(function (c) {
      return '<div class="fitcard"><div class="fitcard__num">' + esc(c.num) + "</div>" +
        '<h4 class="fitcard__title">' + esc(c.title) + "</h4>" +
        '<p class="fitcard__body">' + c.bodyHtml + "</p></div>";
    }).join("");
    return (
      '<section id="sec-05" class="section" data-reveal>' +
        '<div class="kicker">' + esc(f.kicker) + "</div>" +
        '<h2 class="section__heading">' + esc(f.heading) + "</h2>" +
        '<div class="fitgrid">' + cards + "</div>" +
      "</section>"
    );
  }

  function toolkitHtml() {
    var t = DATA.toolkit;
    var tags = t.tools.map(function (x) { return '<span class="tag">' + esc(x) + "</span>"; }).join("");
    var rows = t.history.map(function (h) {
      return '<div class="hist-row"><div class="hist-date">' + esc(h.date) + "</div>" +
        '<div><div class="hist-title">' + esc(h.title) + "</div>" +
        '<div class="hist-desc">' + esc(h.desc) + "</div></div></div>";
    }).join("");
    return (
      '<section id="sec-06" class="section" style="border-bottom:none" data-reveal>' +
        '<div class="kicker" style="margin-bottom:24px">' + esc(t.kicker) + "</div>" +
        '<div class="tags">' + tags + "</div>" +
        '<div class="history__label">' + esc(t.historyLabel) + "</div>" +
        "<div>" + rows + "</div>" +
      "</section>"
    );
  }

  function footerHtml() {
    var f = DATA.footer, p = DATA.profile;
    return (
      '<footer class="footer" data-reveal>' +
        '<div class="footer__inner">' +
          '<div class="footer__kicker">' + esc(f.kicker) + "</div>" +
          '<h2 class="footer__name">' + esc(p.firstName) + ' <span class="em">' + esc(p.lastName) + "</span></h2>" +
          '<div class="footer__links">' +
            '<a href="mailto:' + esc(p.email) + '">' + esc(p.email) + "</a>" +
            '<a href="' + esc(p.linkedinUrl) + '" target="_blank" rel="noopener noreferrer">' + esc(p.linkedinLabel) + "</a>" +
            "<span>" + esc(p.phone) + "</span>" +
          "</div>" +
          '<div class="footer__meta">' +
            '<span><span class="label">EDU ·</span> ' + esc(f.edu) + "</span>" +
            '<span><span class="label">TARGET ·</span> ' + esc(f.target) + "</span>" +
          "</div>" +
        "</div>" +
      "</footer>"
    );
  }

  // ---- mount ----------------------------------------------------------------
  document.title = DATA.meta.title;
  document.getElementById("app").innerHTML =
    '<div class="progress" data-noprint><div class="progress__bar" id="progressBar"></div></div>' +
    headerHtml() +
    '<div class="shell"><main class="main">' + heroHtml() + approachHtml() + methodHtml() +
      storiesHtml() + numbersHtml() + fitHtml() + toolkitHtml() + "</main></div>" +
    footerHtml();

  // ---- behaviors ------------------------------------------------------------
  var bar = document.getElementById("progressBar");
  var reveals = [].slice.call(document.querySelectorAll("[data-reveal]"));
  var spies = [].slice.call(document.querySelectorAll("[data-spy]"));
  var spyLock = 0; // while > now, spy() won't override the highlight (set on nav click)

  function runCounts(scope) {
    scope.querySelectorAll("[data-count]").forEach(function (n) {
      if (n._done) return;
      n._done = true;
      var target = parseFloat(n.getAttribute("data-count")) || 0;
      var dec = parseInt(n.getAttribute("data-dec") || "0", 10);
      var pre = n.getAttribute("data-prefix") || "";
      var suf = n.getAttribute("data-suffix") || "";
      var start = performance.now(), dur = 1500;
      var fmt = function (v) {
        return pre + v.toLocaleString("en-US", { minimumFractionDigits: dec, maximumFractionDigits: dec }) + suf;
      };
      (function tick(now) {
        var t = Math.min(1, (now - start) / dur);
        n.textContent = fmt(target * (1 - Math.pow(1 - t, 3)));
        if (t < 1) requestAnimationFrame(tick); else n.textContent = fmt(target);
      })(start);
    });
  }

  function drawCharts(scope) {
    scope.querySelectorAll("[data-draw]").forEach(function (n) {
      if (n._drawn) return;
      n._drawn = true;
      var len = n.getTotalLength ? n.getTotalLength() : 1000;
      n.style.transition = "none";
      n.style.strokeDasharray = len;
      n.style.strokeDashoffset = len;
      n.getBoundingClientRect();
      n.style.transition = "stroke-dashoffset 2s cubic-bezier(.22,.61,.36,1)";
      n.style.strokeDashoffset = "0";
    });
    scope.querySelectorAll("[data-area]").forEach(function (n) { n.style.opacity = "1"; });
  }

  function reveal() {
    var vh = window.innerHeight || document.documentElement.clientHeight;
    reveals = reveals.filter(function (el) {
      var r = el.getBoundingClientRect();
      if (r.top < vh * 0.88 && r.bottom > 0) {
        el.style.opacity = "1";
        el.style.transform = "none";
        runCounts(el);
        drawCharts(el);
        return false;
      }
      return true;
    });
  }

  function spy() {
    if (Date.now() < spyLock) return; // a nav click owns the highlight for a beat
    var mid = 120, active = null; // small top offset, not 0.32*vh — short sections were being skipped
    spies.forEach(function (a) {
      var sec = document.getElementById(a.getAttribute("data-spy"));
      if (sec && sec.getBoundingClientRect().top <= mid) active = a;
    });
    spies.forEach(function (a) { a.classList.toggle("is-active", a === active); });
  }

  function onScroll() {
    var d = document.documentElement;
    var max = d.scrollHeight - d.clientHeight || 1;
    var p = Math.min(1, Math.max(0, (window.scrollY || d.scrollTop || 0) / max));
    bar.style.transform = "scaleX(" + p + ")";
    reveal();
    spy();
  }

  // story accordion
  document.querySelectorAll("[data-toggle]").forEach(function (row) {
    function toggleStory() {
      var card = row.closest(".story");
      var detail = card.querySelector(".story__detail");
      var open = card.classList.toggle("is-open");
      row.setAttribute("aria-expanded", open ? "true" : "false");
      detail.style.maxHeight = open ? detail.querySelector(".story__detail-inner").scrollHeight + "px" : "0px";
    }
    row.addEventListener("click", toggleStory);
    row.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        toggleStory();
      }
    });
  });

  // domain filter
  document.querySelectorAll("[data-filter]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var key = btn.getAttribute("data-filter");
      document.querySelectorAll("[data-filter]").forEach(function (b) {
        b.classList.toggle("is-on", b === btn);
      });
      document.querySelectorAll(".story").forEach(function (s) {
        s.classList.toggle("is-dim", !(key === "all" || s.getAttribute("data-domain") === key));
      });
    });
  });

  // nav: take over the jump so the clicked item is highlighted immediately and
  // the spy can't reassign it while the smooth scroll is still in flight.
  spies.forEach(function (link) {
    link.addEventListener("click", function (e) {
      e.preventDefault();
      var sec = document.getElementById(link.getAttribute("data-spy"));
      if (!sec) return;
      spies.forEach(function (a) { a.classList.toggle("is-active", a === link); });
      spyLock = Date.now() + 900;
      sec.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  });

  // ---- print / PDF export ---------------------------------------------------
  // Snap every animated value to its final state before the browser paints the
  // print/PDF view, so the export never captures a mid-animation frame and any
  // section the reader never scrolled to is fully rendered. The matching
  // @media print rules handle layout, page breaks, and color preservation.
  function finalizeForPrint() {
    document.querySelectorAll("[data-reveal]").forEach(function (el) {
      el.style.opacity = "1";
      el.style.transform = "none";
    });
    document.querySelectorAll("[data-count]").forEach(function (n) {
      var target = parseFloat(n.getAttribute("data-count")) || 0;
      var dec = parseInt(n.getAttribute("data-dec") || "0", 10);
      var pre = n.getAttribute("data-prefix") || "", suf = n.getAttribute("data-suffix") || "";
      n.textContent = pre + target.toLocaleString("en-US", {
        minimumFractionDigits: dec, maximumFractionDigits: dec
      }) + suf;
      n._done = true;
    });
  }
  window.addEventListener("beforeprint", finalizeForPrint);

  document.querySelectorAll("[data-print]").forEach(function (printBtn) {
    printBtn.addEventListener("click", function () {
      finalizeForPrint();
      window.print();
    });
  });

  window.addEventListener("scroll", onScroll, { passive: true });
  window.addEventListener("resize", onScroll, { passive: true });
  onScroll();
  requestAnimationFrame(reveal);
  // safety: if nothing scrolled, reveal everything after a beat
  setTimeout(function () {
    reveals.forEach(function (el) {
      el.style.opacity = "1"; el.style.transform = "none";
      runCounts(el); drawCharts(el);
    });
    reveals = [];
  }, 2600);
})();
</script>
</body>
</html>
